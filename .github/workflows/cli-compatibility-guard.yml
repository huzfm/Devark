name: CLI Backward Compatibility Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  cli-compat:
    runs-on: ubuntu-latest

    steps:
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: base/pnpm-lock.yaml

      # Step 1: Checkout base branch

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: base

      - name: Install dependencies (base)
        run: |
          cd base
          pnpm install --no-frozen-lockfile

      - name: Build CLI (base)
        run: |
          cd base
          pnpm turbo run build --filter=cli

      - name: Run base CLI
        run: |
          cd base/apps/cli
          node dist/bin/devark.js --help > ../../base-help.txt

      # Step 2: Checkout PR branch

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Install dependencies (PR)
        run: |
          cd pr
          pnpm install --no-frozen-lockfile

      - name: Build CLI (PR)
        run: |
          cd pr
          pnpm turbo run build --filter=cli

      - name: Run PR CLI
        run: |
          cd pr/apps/cli
          node dist/bin/devark.js --help > ../../pr-help.txt

      # Step 3: Compare outputs

      - name: Detect breaking CLI changes
        run: |
          diff base-help.txt pr-help.txt > cli-diff.txt || true

      # Step 4: Warn if differences exist

      - name: Comment warning on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            if (!fs.existsSync("cli-diff.txt")) return;

            const diff = fs.readFileSync("cli-diff.txt", "utf8");

            if (!diff.trim()) {
              console.log("No CLI breaking changes detected.");
              return;
            }

            const body = [
              "**Potential CLI Breaking Change Detected**",
              "",
              "The CLI help output has changed in this PR.",
              "This may indicate a breaking change for existing users.",
              "",
              "**Diff:**",
              "```diff",
              diff.slice(0, 4000),
              "```",
              "",
              "Please verify backward compatibility or document the change."
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });